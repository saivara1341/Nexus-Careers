<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nexus Careers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&family=Space+Mono:wght@400;700&family=Bodoni+Moda:wght@500;700&family=Roboto+Mono:wght@400;500&family=Syne:wght@700;800&family=Syncopate:wght@700&family=Orbitron:wght@600;700;900&family=Rajdhani:wght@500;600;700&family=Archivo+Black&display=swap"
    rel="stylesheet">

  <!-- Using display=block to ensure icons are prioritized by the browser renderer -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    rel="stylesheet" />

  <!-- Pannellum 360 Viewer -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    :root {
      --font-display: "Rajdhani", sans-serif;
      --font-body: "Inter", sans-serif;
      --font-student-body: "Space Mono", monospace;
      --font-student-label: "Roboto Mono", monospace;
      --font-portal-title: "Bodoni Moda", serif;
    }

    /* Fix for Material Symbols: Added !important to font-family to ensure icons render correctly */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined' !important;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 1.2em;
      height: 1.2em;
      line-height: 1;
      overflow: visible;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'liga';
    }

    /* Refined Font Sizing for better Mobile Density & Readability */
    html {
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    @media (min-width: 768px) {
      html {
        font-size: 16px;
      }
    }

    /* --- Themes --- */
    .theme-gamified {
      --color-primary-rgb: 0 230 230;
      --color-secondary-rgb: 255 140 0;
      --color-background: #050507;
      --color-card-bg: rgba(20, 25, 35, 0.6);
      --color-text-base: #e2e8f0;
      --color-text-muted: #94a3b8;
      --color-input-bg: rgba(30, 35, 45, 0.7);
    }

    .theme-professional {
      --color-primary-rgb: 194 65 12;
      --color-secondary-rgb: 15 118 110;
      --color-background: #fff8ed;
      --color-card-bg: rgba(255, 253, 247, 0.94);
      --color-text-base: #171717;
      --color-text-muted: #6b6258;
      --color-input-bg: #fffdf7;
    }

    body {
      background-color: var(--color-background);
      transition: background-color 0.3s ease, color 0.3s ease;
      font-family: var(--font-body);
      line-height: 1.6;
      color: var(--color-text-base);
      overflow-x: hidden;
    }

    .theme-professional body {
      background:
        radial-gradient(circle at 10% 0%, rgba(245, 158, 11, 0.14), transparent 30rem),
        radial-gradient(circle at 92% 10%, rgba(var(--color-secondary-rgb), 0.10), transparent 26rem),
        linear-gradient(180deg, #fffdf7 0%, var(--color-background) 48%, #f6efe3 100%);
    }

    .theme-professional .animated-gradient-text {
      background: linear-gradient(135deg, #171717 0%, #c2410c 48%, #0f766e 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .theme-professional header.bg-card-bg\/80,
    .theme-professional nav.bg-card-bg\/95 {
      background: rgba(255, 253, 247, 0.96) !important;
      border-color: #eadccb !important;
      box-shadow: 0 12px 30px rgba(120, 53, 15, 0.08) !important;
    }

    .theme-professional nav [class*="border-primary"] {
      border-color: #eadccb !important;
    }

    .theme-professional nav button {
      color: #4b4037;
    }

    .theme-professional nav button:hover {
      background: rgba(var(--color-primary-rgb), 0.08) !important;
      color: rgb(var(--color-primary-rgb)) !important;
    }

    .theme-professional nav button:has(.text-primary),
    .theme-professional nav button:has(.text-secondary) {
      background: rgb(var(--color-primary-rgb)) !important;
      color: #ffffff !important;
      box-shadow: none !important;
    }

    .theme-professional nav button:has(.text-primary) .material-symbols-outlined,
    .theme-professional nav button:has(.text-secondary) .material-symbols-outlined {
      color: #ffffff !important;
    }

    .theme-professional nav .material-symbols-outlined {
      color: #6b6258;
    }

    .theme-professional nav h2 span {
      color: inherit !important;
    }

    .theme-professional nav h2 {
      color: #171717 !important;
      text-shadow: none !important;
    }

    .theme-professional nav h2 span:first-child {
      color: rgb(var(--color-primary-rgb)) !important;
    }

    .theme-professional nav h2+span {
      color: #8a7c70 !important;
    }

    .animated-gradient-text {
      background: linear-gradient(135deg, rgb(var(--color-primary-rgb)), rgb(var(--color-secondary-rgb)), rgb(var(--color-primary-rgb)));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      animation: gradient-shift 8s linear infinite;
    }

    @keyframes gradient-shift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(var(--color-text-muted), 0.3);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(var(--color-primary-rgb), 0.6);
    }

    .safe-area-pb {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body class="font-body text-text-base antialiased selection:bg-primary/30 selection:text-white">
  <div id="root"></div>
  <script src="%BASE_URL%env.js"></script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
